<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - CodePVG</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <script src="js/navbar.js"></script>
</head>
<body>

    <main class="page">
        <div class="form-container">
            <div class="form-card" id="registration-form">
                <h1 class="page-title">Join the Leaderboard</h1>

                <p class="text-center" style="margin-bottom: 2rem; color: #ccc; font-size: 1.1rem;">
                    Register to start tracking your LeetCode progress and compete with your peers!
                </p>

                <form id="registrationForm">
                    <div class="form-group">
                        <label for="name" class="form-label">Full Name</label>
                        <input
                            type="text"
                            id="name"
                            name="name"
                            class="form-input"
                            placeholder="Enter your full name"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="leetcodeId" class="form-label">LeetCode Username</label>
                        <input
                            type="text"
                            id="leetcodeId"
                            name="leetcodeId"
                            class="form-input"
                            placeholder="Enter your LeetCode username"
                            required
                        >
                        <small class="form-help">
                            This should match your username on leetcode.com/username
                        </small>
                    </div>

                    <div style="text-align: center;">
                        <button id="registerBtn" type="submit" class="btn btn-primary" style="margin: 0 auto;">
                            Register Now
                        </button>
                    </div>
                </form>
            </div>

            <div class="form-card success-container hidden" id="success-message">
                <div class="success-icon">✅</div>
                <h2 class="success-title">Registration Successful!</h2>
                <p class="success-message" id="welcome-message">
                    Welcome to the CodePVG LeetCode Leaderboard!
                </p>
                <button class="btn btn-primary" onclick="resetForm()">
                    Register Another User
                </button>
            </div>
        </div>
    </main>

    <script>
        function showSuccess(name) {
            document.getElementById('registration-form').classList.add('hidden');
            document.getElementById('success-message').classList.remove('hidden');
            document.getElementById('welcome-message').innerHTML =
                `Welcome to the CodePVG LeetCode Leaderboard, ${name}!<br>
                 Your name will appear on the leaderboard after the next auto-sync.<br>
                 <small>(See the About section for details)</small>`;
        }

        function resetForm() {
            document.getElementById('registration-form').classList.remove('hidden');
            document.getElementById('success-message').classList.add('hidden');
            document.getElementById('registrationForm').reset();
        }

        function extractUsername(input) {
            let value = input.trim();

            if (value.includes('leetcode.com/') || value.includes('://')) {
                const patterns = [
                    /leetcode\.com\/u\/([A-Za-z0-9_-]+)/i,
                    /leetcode\.com\/([A-Za-z0-9_-]+)/i
                ];

                for (const pattern of patterns) {
                    const match = value.match(pattern);
                    if (match && match[1]) {
                        return match[1];
                    }
                }
            }

            value = value.replace(/[^A-Za-z0-9_-]/g, '');
            return value;
        }

        function isValidId(id) {
            return fetch(`https://leetcode-api-dun.vercel.app/${id.trim()}`, {
                method: "GET",
                headers: {
                    "Content-Type": "application/json"
                }
            })
                .then(response => response.json())
                .then(data => {
                    const errors = data.errors;
                    return !(errors && errors.some(err => err.message === "That user does not exist."));
                })
                .catch(error => {
                    console.error("Fetch error:", error);
                    return false;
                });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('registrationForm');
            const leetcodeInput = document.getElementById('leetcodeId');
            const registerBtn = document.getElementById('registerBtn');

            leetcodeInput.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedText = (e.clipboardData || window.clipboardData).getData('text');
                const username = extractUsername(pastedText);
                leetcodeInput.value = username;
            });

            leetcodeInput.addEventListener('input', (e) => {
                const cursorPosition = e.target.selectionStart;
                const originalLength = e.target.value.length;

                e.target.value = extractUsername(e.target.value);

                const newLength = e.target.value.length;
                const diff = originalLength - newLength;
                e.target.setSelectionRange(cursorPosition - diff, cursorPosition - diff);
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                registerBtn.disabled = true;
                registerBtn.innerText = "Registering...";

                const formData = new FormData(form);
                const name = formData.get('name');
                const leetcodeId = formData.get('leetcodeId');

                try {
                    if (name && leetcodeId) {
                        const isValid = await isValidId(leetcodeId);

                        if (!isValid) {
                            alert("Please enter a correct LeetCode Username!");
                            registerBtn.disabled = false;
                            registerBtn.innerText = "Register Now";
                            return;
                        }

                        const response = await fetch("https://lc-backend-lyq2.onrender.com/user", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({
                                name: name.trim(),
                                id: leetcodeId.trim()
                            })
                        });

                        if (!response.ok) {
                            throw new Error("Failed to register user");
                        }

                        const data = await response.json();
                        console.log("User registered successfully:", data);
                        showSuccess(name);
                    }
                } catch (error) {
                    alert("An error occurred during registration. Please try again.");
                    console.error(error);
                } finally {
                    registerBtn.disabled = false;
                    registerBtn.innerText = "Register Now";
                }
            });
        });
    </script>
    <script src="js/footer.js"></script>
</body>
</html>
